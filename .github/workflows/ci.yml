name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen --group dev --group release

      - name: Format check
        run: uv run --no-sync ruff format --check .

      - name: Lint
        run: uv run --no-sync ruff check .

      - name: Type check
        run: uv run --no-sync mypy src examples tests

      - name: Security lint
        run: uv run --no-sync bandit -q -c pyproject.toml -r src/quater

      - name: Dependency audit
        run: uv run --no-sync pip-audit

      - name: Test Rust router
        run: cargo test --locked

      - name: Build package distributions
        run: uv build

      - name: Check package metadata
        run: uv run --no-sync twine check dist/*

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install docs dependencies
        run: npm ci

      - name: Audit docs dependencies
        run: npm audit --audit-level=moderate

      - name: Build docs
        run: npm run docs:build

  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run tests with coverage
        run: uv run --no-sync coverage run -m pytest -q

      - name: Coverage report
        run: uv run --no-sync coverage report

      - name: Generate coverage XML
        if: matrix.python-version == '3.13'
        run: uv run --no-sync coverage xml -o coverage.xml

      - name: Upload coverage to Codecov
        if: ${{ matrix.python-version == '3.13' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          use_oidc: true
