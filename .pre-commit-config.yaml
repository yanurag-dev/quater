repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run --no-sync ruff format --check .
        language: system
        pass_filenames: false

      - id: ruff-check
        name: ruff check
        entry: uv run --no-sync ruff check .
        language: system
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run --no-sync mypy src examples tests
        language: system
        pass_filenames: false
